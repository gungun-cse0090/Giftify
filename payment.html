<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    .box {
      background: white;
      margin: 50px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>💳 Payment Page</h2>

  <p>Total Items: <span id="items"></span></p>
  <p>Total Amount: ₹<span id="amount"></span></p>

  <button onclick="payNow()">Pay Now</button>
</div>

<script>

/* 🧠 SAFE LOAD */
let items = parseInt(localStorage.getItem("cartCount")) || 0;
let amount = parseInt(localStorage.getItem("cartTotal")) || 0;

/* UI */
document.getElementById("items").innerText = items;
document.getElementById("amount").innerText = amount > 0 ? amount : 0;

/* 💳 PAY FUNCTION */
function payNow(){
  if(items <= 0){
    alert("Cart is empty 😅");
    return;
  }

  alert("Payment Successful 🎉");

  /* CLEAR CART AFTER PAYMENT */
  localStorage.setItem("cartCount", 0);
  localStorage.setItem("cartTotal", 0);

  window.location.href = "home.html";
}

</script>

</body>
</html>
