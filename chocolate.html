<!DOCTYPE html>
<html>
<head>
  <title>Chocolate Gifts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f1f3f6;
      text-align: center;
    }

    header {
      background: #ffcc70;
      padding: 10px;
      font-size: 18px;
    }

    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      max-width: 200px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .add {
      background: #131921;
      color: white;
    }

    .remove {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<header>
  🍫 Chocolates | Cart: <span id="cart">0</span>
</header>
<div style="position:fixed; bottom:20px; right:20px;">
  <button onclick="goToPayment()">🛒 Payment</button>
</div>
<div class="card">
  <img src="choco14.png.png">
  <h3>Decorative Ferrero Rocher</h3>
  <p>₹2499</p>
  <button class="add" onclick="add(2499)">Add to Cart</button>
  <button class="remove" onclick="removeItem(2499)">Remove</button>
</div>

<div class="card">
  <img src="cocoo.png">
  <h3>Basket full of chocolates</h3>
  <p>₹1299</p>
  <button class="add" onclick="add(1299)">Add to Cart</button>
  <button class="remove" onclick="removeItem(1299)">Remove</button>
</div>

<div class="card">
  <img src="coco99.png">
  <h3>Magical Chocolate Basket</h3>
  <p>₹1450</p>
  <button class="add" onclick="add(1450)">Add to Cart</button>
  <button class="remove" onclick="removeItem(1450)">Remove</button>
</div>

<div class="card">
  <img src="choco4.png">
  <h3>Wood Chocolate Gift Basket</h3>
  <p>₹1300</p>
  <button class="add" onclick="add(1300)">Add to Cart</button>
  <button class="remove" onclick="removeItem(1300)">Remove</button>
</div>

<div class="card">
  <img src="choco5.png">
  <h3>Special Chocolate Hamper</h3>
  <p>₹1400</p>
  <button class="add" onclick="add(1400)">Add to Cart</button>
  <button class="remove" onclick="removeItem(1400)">Remove</button>
</div>

<script>
let count = parseInt(localStorage.getItem("cartCount")) || 0;
let total = parseInt(localStorage.getItem("cartTotal")) || 0;

document.getElementById("cart").innerText = count;

function add(price){
  count = parseInt(localStorage.getItem("cartCount")) || 0;
  total = parseInt(localStorage.getItem("cartTotal")) || 0;

  count++;
  total += price;

  localStorage.setItem("cartCount", count);
  localStorage.setItem("cartTotal", total);

  document.getElementById("cart").innerText = count;
}

function removeItem(price){
  count = parseInt(localStorage.getItem("cartCount")) || 0;
  total = parseInt(localStorage.getItem("cartTotal")) || 0;

  if(count > 0){
    count--;
    total -= price;

    if(total < 0) total = 0;

    localStorage.setItem("cartCount", count);
    localStorage.setItem("cartTotal", total);

    document.getElementById("cart").innerText = count;
  }
}

function goToPayment(){
  let c = parseInt(localStorage.getItem("cartCount")) || 0;

  if(c <= 0){
    alert("Cart is empty 😅");
    return;
  }

  window.location.href = "payment.html";
}

</script>

</body>
</html>
